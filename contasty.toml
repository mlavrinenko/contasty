# contasty configuration — drop this in your project root.
#
# All fields are optional; defaults are shown below.

# Category inclusion: what to keep in the stripped output.
# Built-in defaults: comments and tests excluded, imports included.
# Override cross-language defaults under [include], then refine per language
# under [languages.<lang>.include].
#
# [include]
# comments = false
# imports  = true
# tests    = false
#
# [languages.rust.include]
# comments = true    # keep doc comments for Rust only

# All per-language config lives under [languages.<lang>]: category inclusion,
# plus (optionally) a dynamic grammar and a rule extend/override. Built-in
# languages (rust, php) need none of the grammar/rule fields.
#
# Dynamic grammar — for a language ast-grep does not bundle. A `libraryPath`
# marks the entry as a custom grammar; `extensions` and `rules` are required.
# See docs/languages.md.
#
# [languages.jsonc]
# libraryPath = "grammars/jsonc.so"   # or a per-target-triple map (see docs)
# extensions  = ["jsonc"]
# rules       = "rules/jsonc.yml"
#
#   [languages.jsonc.include]
#   tests = true
#
# Rule extend/override — point any language at a user rule file (see
# docs/custom-rules.md). At most one of `extend` / `override` per entry.
#
# [languages.rust]
# extend = "rules/rust-extra.yml"     # append to the embedded rust.yml
#
# [languages.php]
# override = "rules/php-custom.yml"   # replace the embedded php.yml

# Reformatter — tidy a language's stripped output (cosmetic; failures fall back
# to the raw splice). Rust uses prettyplease by default. See docs/reformatting.md.
#
# [languages.php]
# reformat = "topiary"                            # embedded (needs --features topiary)
#
# [languages.typescript]
# reformat = { command = ["prettier", "--parser", "typescript"] }   # shell-out (stdin->stdout)
#
# [languages.rust]
# reformat = "none"                               # disable the built-in prettyplease pass

[compact]
# Minimum byte-length of a value expression that qualifies for elision.
# Small definitions (like `pub const MAX: usize = 42;`) are kept intact
# so LLM agents can still see named constants and small data tables.
# Set to 0 to elide every const/static/type value regardless of size.
# Default: 80
elide_min_bytes = 80

# String literals longer than this (in bytes) are replaced with
# `"[…contasty]"` so long embedded strings don't bloat the output.
# Set to a very large number (e.g. 100000) to effectively disable.
# Default: 256
max_string_bytes = 256
